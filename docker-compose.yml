name: kron-cms

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # MinIO bucket'ini olusturup public-read yapar, sonra cikar
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/$${S3_BUCKET} &&
      mc anonymous set download local/$${S3_BUCKET} &&
      echo 'MinIO bucket hazir: '$${S3_BUCKET}
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kron-cms:dev
    restart: unless-stopped
    # Container acilisinda: client uret -> migration uygula -> seed -> dev sunucu
    command: ["sh", "-c", "cd apps/api && npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run start:dev"]
    env_file: .env
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      # Uretilen/derlenen ciktilar container-local kalir (Windows bind-mount
      # sync sorunlarini onler: dist/generated host'a yazilmaz, container FS'inde durur)
      - /app/apps/api/node_modules
      - /app/apps/api/dist
      - /app/apps/api/src/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    # api ile ayni imaji kullanir (tek build, paralel export yarisini onler)
    image: kron-cms:dev
    restart: unless-stopped
    command: npm run dev:web
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
